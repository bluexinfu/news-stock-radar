# 媒體來源可信度權重表（熱度指標 v2 — P1）
#
# 原則：熱度 = Σ 每篇新聞的「來源可信度權重」。
#   權重高 = 該媒體一篇文章代表更多「有份量的關注」。
#   未列出的長尾來源 → 套用 default。
#
# 權重尺度（0~1）：
#   1.0  高權威：主流財經報 + 半導體專業研究
#   0.7  主流財經/科技媒體
#   0.5  綜合媒體 / 大型聚合
#   0.3  投顧內容行銷 / 一般聚合（default）
#   0.2  新聞稿 / 自動生成 / 促銷稿
#
# ⚠️ 以下為初版草案，數值可調。歡迎依你的信任度修改。

default: 0.3

sources:
  # ── Tier A（1.0）主流財經報 + 半導體專業 ──────────────────────
  經濟日報: 1.0
  工商時報: 1.0
  MoneyDJ: 1.0
  DIGITIMES: 1.0
  digitimes: 1.0
  TrendForce: 1.0
  Semiconductor Engineering: 0.9
  鉅亨號: 0.9
  news.cnyes.com: 0.9          # 鉅亨網

  # ── Tier B（0.7）主流財經/科技媒體 ────────────────────────────
  TechNews 科技新報: 0.8
  CMoney: 0.8                   # 台灣主流投資平台媒體（股市APP），投資人觸及廣
  優分析UAnalyze: 0.7
  自由財經: 0.7
  UDN: 0.7                      # 聯合新聞網
  Yahoo股市: 0.7               # 你指定信任
  CMoney投資網誌: 0.7          # CMoney 投資網誌（作者投稿，品質略有差異故 0.7）
  Data Center Dynamics: 0.7
  Nature: 0.7                   # 學術權威（非市場熱度，故非滿分）

  # ── Tier C（0.5）綜合媒體/聚合/科技blog ──────────────────────
  Yahoo Finance: 0.6
  Yahoo新聞: 0.5
  中時新聞網: 0.5
  ETtoday財經雲: 0.5
  理財周刊: 0.5
  Investing.com: 0.5
  Tom's Hardware: 0.5
  FTNN 新聞網: 0.4
  旺得富理財網: 0.4
  Wccftech: 0.4

  # ── Tier D（0.3 或更低）券商促銷/新聞稿/自動生成 ──────────────
  sinotrade.com.tw: 0.3        # 永豐金證券（券商促銷）
  Stock Titan: 0.2             # 自動生成
  PR Newswire: 0.2             # 新聞稿
  Business Wire: 0.2           # 新聞稿
