name: Telegram Listener

# 每 5 分鐘輪詢一次 Bot 收件匣，處理使用者指令
# 支援：/run（觸發日報）、/status（查詢狀態）、/help

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:   # 也可手動觸發測試

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write   # 寫入 data branch（儲存 offset）
      actions: write    # 觸發 daily_pipeline.yml workflow_dispatch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 從 data branch 讀取上次的 offset（避免重複處理舊訊息）
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: _data_cache
        continue-on-error: true

      # 執行監聽腳本
      - name: Listen for Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/telegram_listener.py

      # 把更新後的 offset 推回 data branch
      - name: Save offset to data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          cd _data_cache
          git add telegram_offset.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️ offset 無變動，略過 commit"
          else
            git commit -m "chore: update telegram listener offset"
            git push \
              "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
              data
          fi
        continue-on-error: true
